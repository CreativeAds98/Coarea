/* Full Photo Card Container */
    .id-card-inner {
        position: relative;
        height: 380px; /* Fixed height for uniform grid */
        background: white;

        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
    }

    /* The Full Photo */
    .card-photo {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
    }

    /* Dark gradient overlay so white text is readable on photos */
    .card-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(15, 23, 42, 0.95) 0%, rgba(15, 23, 42, 0.4) 40%, transparent 100%);
        z-index: 2;
    }

    /* Content on top of the image */
    .card-content {
        position: relative;
        z-index: 3;
        padding: 1.5rem;
    }

    /* ID Badge Styling */
    .id-badge {
        position: absolute;
        top: 1rem;
        left: 1rem;
        z-index: 4;
    }

    /* Verification Badge */
    .verify-badge {
        position: absolute;
        top: 1rem;
        right: 1rem;
        z-index: 4;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
